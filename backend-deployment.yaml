apiVersion: apps/v1
kind: Deployment
metadata:
  name: meal-backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meal-backend
  template:
    metadata:
      labels:
        app: meal-backend
    spec:
      containers:
        - name: backend
          image: meal-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
