version: "3.9"

services:
  backend:
    build: ./backend
    container_name: meal-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    networks:
      - meal-network

  frontend:
    build: ./frontend
    container_name: meal-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - meal-network

networks:
  meal-network:
    driver: bridge
